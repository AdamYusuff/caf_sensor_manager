nk:href="#lend13"/></marker><marker id="mrkr13-82" class="st16" markerUnits="strokeWidth" orient="auto" overflow="visible" refX="-10.56"><use transform="scale(-3.52,-3.52)" xlink:href="#lend13"/></marker><marker id="mrkr13-88" class="st19" markerUnits="strokeWidth" orient="auto" overflow="visible" refX="-10.56"><use transform="scale(-3.52,-3.52)" xlink:href="#lend13"/></marker></defs><g><title>Page-1</title><g id="shape2553-1" transform="translate(1,-1)"><title>Nordic Blue</title><rect width="307.984" height="167.139" x="0" y="239.223" class="st1"/></g><g id="shape2554-3" transform="translate(56.7008,-323.857)"><title>Nordic Lake</title><desc>Wheel Uses QDEC to measure rotation. Submits wheel_event when...</desc><rect width="190.306" height="81.505" x="0" y="324.857" class="st1"/><text x="9.67" y="350.61" class="st2">Wheel <tspan x="9.67" class="st3" dy="2.52em">Uses QDEC to measure rotation. Submits </tspan><tspan x="9.67" class="st3" dy="1.38em">wheel_event when rotation is detected.</tspan></text></g><g id="shape2558-8" transform="translate(56.7008,-207.929)"><title>Nordic Lake.2558</title><desc>Buttons Submits button_event on key press or release. The det...</desc><rect width="190.306" height="105.304" x="0" y="301.058" class="st1"/><text x="9.67" y="323.11" class="st2">Buttons <tspan x="9.67" class="st4" dy="2.7em">Submits button_event on key press or release. </tspan><tspan x="9.67" class="st4" dy="1.2em">The detection of the first button press is based </tspan><tspan x="9.67" class="st4" dy="1.2em">on interrupts. Then, the module scans </tspan><tspan x="9.67" class="st4" dy="1.2em">keyboard matrix periodically until no </tspan><tspan class="st4">button is </tspan><tspan x="9.67" class="st4" dy="1.5em">pressed.</tspan></text></g><g id="shape2563-17" transform="translate(351.504,-35.0158)"><title>Nordic Middle Grey</title><desc>USB state / HIDS Sends the HID input report to the host and n...</desc><rect width="162.601" height="91.467" x="0" y="314.895" class="st5"/><text x="9.67" y="339.63" class="st2">USB state / HIDS <tspan x="9.67" class="st3" dy="2.52em">Sends the HID input report to the </tspan><tspan x="9.67" class="st3" dy="1.2em">host and notifies when the report </tspan><tspan x="9.67" class="st3" dy="1.38em">is sent.</tspan></text></g><g id="shape2559-23" transform="translate(351.504,-207.929)"><title>Nordic Lake.2559</title><desc>HID state</desc><rect width="168.378" height="183.636" x="0" y="222.727" class="st1"/><text x="9.67" y="239.54" class="st2">HID state</text></g><g id="shape2560-26" transform="translate(356.689,-299.747)"><title>Nordic Lake.2560</title><desc>Updates the HID report data.</desc><rect width="157.423" height="65.66" x="0" y="340.702" class="st6"/><text x="9.67" y="376.53" class="st7">Updates the HID report data.</text></g><g id="shape2561-29" transform="translate(356.689,-220.451)"><title>Nordic Lake.2561</title><desc>Generates the HID input report based on the report data and s...</desc><rect width="157.423" height="52.675" x="0" y="353.687" class="st6"/><text x="9.67" y="371.02" class="st7">Generates the HID input report <tspan x="9.67" class="st8" dy="1.2em">based on the report data and </tspan><tspan x="9.67" class="st8" dy="1.2em">sends it to the active subscriber.</tspan></text></g><g id="shape2566-34" transform="translate(6.56805,-42.6042)"><title>Nordic Lake.2566</title><desc>STATE IDLE Uses the trigger to detect motion after inactivity.</desc><rect width="89.818" height="91.467" x="0" y="314.895" class="st6"/><text x="9.67" y="339.03" class="st9">STATE IDLE <tspan x="9.67" class="st10" dy="2.46em">Uses the trigger </tspan><tspan x="9.67" class="st10" dy="1.2em">to detect motion </tspan><tspan x="9.67" class="st10" dy="1.38em">after inactivity.</tspan></text></g><g id="shape2567-40" transform="translate(178.591,-11.5377)"><title>Nordic Lake.2567</title><desc>STATE FETCHING Uses a dedicated thread to fetch samples from ...</desc><rect width="120.472" height="143.951" x="0" y="262.412" class="st6"/><text x="9.67" y="288.79" class="st9">STATE FETCHING <tspan x="9.67" class="st10" dy="2.46em">Uses a dedicated thread </tspan><tspan x="9.67" class="st10" dy="1.2em">to fetch samples from </tspan><tspan x="9.67" class="st10" dy="1.2em">the sensor. </tspan><tspan x="9.67" class="st10" dy="2.4em">Triggers sampling </tspan><tspan x="9.67" class="st10" dy="1.2em">operation when a HID </tspan><tspan x="9.67" class="st10" dy="1.38em">mouse report is sent.</tspan></text></g><g id="shape2568-49" transform="translate(96.3858,-81.251)"><title>Dynamic connector</title><path d="M0 399.28 L71.64 399.28" class="st11"/></g><g id="shape2569-55" transform="translate(96.3858,-96.2189)"><title>Sheet.2569</title><desc>Sensor data ready</desc><rect width="82.205" height="20" x="0" y="386.362" class="st13"/><text x="8.15" y="399.06" class="st14">Sensor data ready</text></g><g id="shape2570-58" transform="translate(178.591,-56.6126)"><title>Dynamic connector.2570</title><path d="M0 399.28 L-71.64 399.28" class="st11"/></g><g id="shape2571-63" transform="translate(96.3858,-11.1796)"><title>Sheet.2571</title><desc>No motion for predefined number of samples</desc><rect width="82.205" height="45.433" x="0" y="360.929" class="st13"/><text x="15.23" y="375.55" class="st14">No motion for <tspan x="5.44" class="st8" dy="1.2em">predefined number </tspan><tspan x="21.43" class="st8" dy="1.2em">of samples</tspan></text></g><g id="shape2572-68" transform="translate(6.56805,-136.447)"><title>Sheet.2572</title><desc>Motion sensor</desc><rect width="103.991" height="28.346" x="0" y="378.016" class="st13"/><text x="4" y="396.39" class="st2">Motion sensor</text></g><g id="shape2574-71" transform="translate(308.984,-18.0078)"><title>Dynamic connector.2574</title><path d="M10.2 406.36 L10.56 406.36 L123.82 406.36 L123.82 389.35" class="st15"/></g><g id="shape2578-77" transform="translate(377.663,-207.762)"><title>Dynamic connector.2578</title><path d="M7.09 406.36 L7.09 477.08" class="st17"/